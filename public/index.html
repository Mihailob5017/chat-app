<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./css/style.css">
    <title>Chat Servise</title>
</head>
<body>
    <h1 class="header">Chat Service</h1>
    <!--Message Box-->
    <ul class="message-box">

    </ul>
   <h3 id="islogedin">You are not logged in</h3>
    <!--Log In-->
    <form class='log-in-box'>
        <input type="text" autocomplete="off" id="username" required />
        <input type="submit" value="Log In" id='submit'>
    </form>
    
    <!--Send Message-->
    <form class="send-message-box">
        <input type="text" id="message" maxlength="60">
        <input  type='submit' id="message-btn"  value="Send Message"  disabled/>
    </form>
    


<script src="/socket.io/socket.io.js"></script>    
<script src="./chat.js"></script>
</body>
</html>
